    - reference: "PALM New 3m_wind_speed"
      comparison: "ICON-D2 3m_wind_speed"
    - reference: "PALM New 10m_wind_direction"
      comparison: "ICON-D2 10m_wind_direction"
    - reference: "PALM New 3m_wind_direction"
      comparison: "ICON-D2 3m_wind_direction"
    
    # Radiation Comparisons (Note: ICON-D2 does not provide radiation data)
    - reference: "Tower 8m_shortwave_down"
      comparison: "PALM New 8m_shortwave_down"
    - reference: "Tower 2m_shortwave_down"
      comparison: "PALM New 2m_shortwave_down"
    - reference: "Tower 8m_shortwave_up"
      comparison: "PALM New 8m_shortwave_up"
    - reference: "Tower 2m_shortwave_up"
