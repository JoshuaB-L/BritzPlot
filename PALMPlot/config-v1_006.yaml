      comparison: "ICON-D2 2m_relative_humidity"
    - reference: "PALM New 10m_relative_humidity"
      comparison: "ICON-D2 10m_relative_humidity"
    - reference: "PALM New 8m_relative_humidity"
      comparison: "ICON-D2 8m_relative_humidity"
    - reference: "PALM New 2m_relative_humidity"
      comparison: "ICON-D2 2m_relative_humidity"
    
    # Wind Component Comparisons
    - reference: "Tower 10m_wind_u"
      comparison: "PALM New 10m_wind_u"
    - reference: "Tower 10m_wind_v"
      comparison: "PALM New 10m_wind_v"
    - reference: "Tower 10m_wind_w"
