    - reference: "Tower 10m_wind_w"
      comparison: "ICON-D2 10m_wind_w"
    - reference: "Tower 3m_wind_u"
      comparison: "ICON-D2 3m_wind_u"
    - reference: "Tower 3m_wind_v"
      comparison: "ICON-D2 3m_wind_v"
    - reference: "Tower 3m_wind_w"
      comparison: "ICON-D2 3m_wind_w"
    - reference: "PALM New 10m_wind_u"
      comparison: "ICON-D2 10m_wind_u"
    - reference: "PALM New 10m_wind_v"
      comparison: "ICON-D2 10m_wind_v"
