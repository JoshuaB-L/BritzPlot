# Enhanced Meteorological Comparison Analysis Configuration - Publication Quality
# ===============================================================================

# Variables to analyze in this run
variables_to_analyze:
  - air_temperature
  - relative_humidity
  - wind_u
  - wind_v
  - wind_w
  - wind_speed
  - wind_direction
  - shortwave_down
  - shortwave_up

# Height mappings between tower measurements and PALM grid coordinates
height_mappings:
  - name: "2m"
    tower_height: 2.0
    palm_z_coordinate: 19.5
    label_suffix: "2m"
  - name: "3m"
    tower_height: 2.5  # Actual sensor height for wind measurements
    palm_z_coordinate: 20.5
    label_suffix: "3m"
  - name: "8m"
    tower_height: 8.0
    palm_z_coordinate: 25.5
    label_suffix: "8m"
  - name: "10m"
    tower_height: 10.0
    palm_z_coordinate: 27.5
    label_suffix: "10m"

# Output Configuration for Publication Quality
output:
  directory: "./results-v1_006"
  show_plot: false
  
  # Multiple format support for academic publishing
  png_enabled: true      # High-resolution PNG for manuscripts
  pdf_enabled: true      # Vector PDF for publications (editable text)
  svg_enabled: true      # Scalable vector graphics (editable text)
  dpi: 300               # Publication-quality resolution

# Analysis Configuration  
analysis:
  start_time: "2024-09-04 00:00:00"
  end_time: "2024-09-05 00:00:00"
  
  # Comparison pairs for statistics generation
  comparison_pairs:
    # Air Temperature Comparisons
    - reference: "Tower 10m_air_temperature"
      comparison: "PALM New 10m_air_temperature"
    - reference: "Tower 8m_air_temperature"
      comparison: "PALM New 8m_air_temperature"
    - reference: "Tower 2m E14071_air_temperature"
      comparison: "PALM New 2m_air_temperature"
    - reference: "Tower 10m_air_temperature"
      comparison: "ICON-D2 10m_air_temperature"
    - reference: "Tower 8m_air_temperature"
      comparison: "ICON-D2 8m_air_temperature"
    - reference: "Tower 2m E14071_air_temperature"
      comparison: "ICON-D2 2m_air_temperature"
    - reference: "PALM New 10m_air_temperature"
      comparison: "ICON-D2 10m_air_temperature"
    - reference: "PALM New 8m_air_temperature"
      comparison: "ICON-D2 8m_air_temperature"
    - reference: "PALM New 2m_air_temperature"
      comparison: "ICON-D2 2m_air_temperature"
    
    # Relative Humidity Comparisons
    - reference: "Tower 10m_relative_humidity"
      comparison: "PALM New 10m_relative_humidity"
